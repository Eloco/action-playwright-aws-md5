name: 'sec_mail_monitor'

on:
  workflow_dispatch:
    inputs:
        logLevel:
          description: 'Log level'     
          required: true
          default: 'warning'
        tags:
          description: 'any info?'  
  schedule:
    - cron:  '*/10 * * * *'
      #push:


jobs:
  main:
    runs-on: ubuntu-latest
    env:
      gist_id : 3fd32567b6c8f6c79808905de208e59a
      repo_name  : Eloco/action-playwright-aws-md5
      repo_token : SEC_TOKEN
    strategy:
      matrix:
       include:
         #- mail_user: WORK_OUTLOOK_USER
         #  mail_pass: WORK_OUTLOOK_KEY
         #  mail_server: 'outlook.office365.com'
         #  mail_box: 'INBOX'
         #  script_name: work_outlook
         #  send_skype_ids: '19:b690a79c04204eb49af0d745893a2d95@thread.skype'
         - mail_user: MINE_GMAIL_USER
           mail_pass: MINE_GMAIL_KEY
           mail_server: 'imap.gmail.com'
           mail_box: 'Important'
           script_name: mine_gmail
           send_skype_ids: '19:4ebaa5742000401fadf45f648138df8f@thread.skype'

    steps:
      - name: Checkout codes
        uses: actions/checkout@v2
        with:
          repository: 'Eloco/Sec-action-playwright-aws-md5'
          token: '${{ secrets.SEC_TOKEN     }}'

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.9

          #- name: set cn-lang
          #  run: |
          #      sudo apt-get install fonts-wqy-zenhei
          #  continue-on-error: true

      - name: Install dependencies
        run: |
            python -m pip install --upgrade pip
            pip install pipreqs
            pipreqs .
            pip install -r requirements.txt
            #python -m playwright install

      - name: run python downloader
        run: |
            export MAIL_USER="${{secrets[matrix.mail_user]}}"
            export MAIL_PASS="${{secrets[matrix.mail_pass]}}"
            export MAIL_SERVER="${{matrix.mail_server}}"
            export MAIL_BOX="${{matrix.mail_box}}"
            python mail/mail_normal.py

      - name: gist-read
        uses: sergeysova/gist-read-action@v1
        id: example-gist
        continue-on-error: true
        with:
          gist_id: ${{env.gist_id}}
          file_name: ${{matrix.script_name}}
        env:
          GITHUB_TOKEN: ${{ secrets.SEC_TOKEN }}

      - name: md5_count
        run: |
            wget https://raw.githubusercontent.com/Eloco/action-playwright-aws-md5/main/script/gist_md5.py
            echo "${{ steps.example-gist.outputs.content }}" > md5.txt || echo "first init" > md5.txt 
            files_num=`python gist_md5.py --file_md5="./md5.txt" --file_dir=download`
            echo $files_num
            echo '::set-output name=FILE_NUM::'$files_num
            head md5.txt
        id: gist-md5

      - uses: popsiclestick/gist-sync-action@v1.2.0
        if  :  steps.gist-md5.outputs.FILE_NUM != '0'
        with:
          auth: ${{ secrets.SEC_TOKEN }}
          gist_url: https://gist.github.com/Eloco/${{env.gist_id}}
          gist_title: ${{matrix.script_name}}
          gist_description: ${{matrix.script_name}}
          github_file: md5.txt

      - name: send skype
        continue-on-error: true
        uses: Eloco/docker-action-send-skype@v2
        if  : steps.gist-md5.outputs.FILE_NUM != '0'
        with:
            skype_username : ${{ secrets.SKYPE_MINE_USERNAME }}
            skype_password : ${{ secrets.SKYPE_MINE_PASSWORD }}
            skype_ids      : ${{matrix.send_skype_ids}}
            send_msg_path  : download 
            send_file_path : none 

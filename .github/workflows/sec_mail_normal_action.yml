name: 'MAIL_MONITOR'

on:
  workflow_dispatch:
    inputs:
        logLevel:
          description: 'Log level'     
          required: true
          default: 'warning'
        tags:
          description: 'any info?'  
  schedule:
    - cron:  '*/10 * * * *'
      #push:


jobs:
  main:
    runs-on: ubuntu-latest
    strategy:
      matrix:
       include:
         - mail_user: WORK_OUTLOOK_USER
           mail_pass: WORK_OUTLOOK_KEY
           mail_server: 'outlook.office365.com'
           mail_box: 'INBOX'
           send_skype_ids: '19:b690a79c04204eb49af0d745893a2d95@thread.skype'
         - mail_user: MINE_GMAIL_USER
           mail_pass: MINE_GMAIL_KEY
           mail_server: 'imap.gmail.com'
           mail_box: 'Important'
           send_skype_ids: '19:4ebaa5742000401fadf45f648138df8f@thread.skype'

    steps:
      - name: Checkout codes
        uses: actions/checkout@v2
        with:
          repository: 'Eloco/Sec-action-playwright-aws-md5'
          token: '${{ secrets.SEC_TOKEN     }}'

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.9

          #- name: set cn-lang
          #  run: |
          #      sudo apt-get install fonts-wqy-zenhei
          #  continue-on-error: true

      - name: Install dependencies
        run: |
            python -m pip install --upgrade pip
            pip install pipreqs
            pipreqs .
            pip install -r requirements.txt
            #python -m playwright install

      - name: run python downloader
        run: |
            export MAIL_USER=${{secrets[matrix.mail_user]}}
            export MAIL_PASS=${{secrets[matrix.mail_pass]}}
            export MAIL_SERVER=$MATRIX_mail_server
            export MAIL_BOX=$MATRIX_mail_box
            python mail/mail_normal.py

      - name: aws setup
        run: |
            python -m pip install awscli
            mkdir ~/.aws
            echo "[default]" >> ~/.aws/credentials
            echo "[default]" >> ~/.aws/config
            echo "aws_access_key_id    = ${{ secrets.AWS_ACCESS_KEY_ID     }}" >> ~/.aws/credentials
            echo "aws_secret_access_key= ${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> ~/.aws/credentials
            echo "region               = ap-east-1"                            >> ~/.aws/config

      - name: aws md5 check
        if: ${{ env.IF_AWS == 'True'}}
        run: |
            export action_bucket=s3://`echo ${GITHUB_REPOSITORY_OWNER}action | tr "[A-Z]" "[a-z]"`
            export command="python aws/md5_aws.py --files_path=download 2>/dev/null"
            files_num=`$command || $command || echo 0` #retry command twice 
            echo '::set-output name=FILE_NUM::'$files_num
        id: aws-md5
        env:
          IF_AWS: True

      - name: send skype
        uses: Eloco/docker-action-send-skype@v2
        if  : steps.aws-md5.outputs.FILE_NUM != '0' || steps.aws-md5.conclusion == 'skipped'
        with:
            skype_username : ${{ secrets.SKYPE_MINE_USERNAME }}
            skype_password : ${{ secrets.SKYPE_MINE_PASSWORD }}
            skype_ids      : $MATRIX_send_skype_ids
            send_msg_path  : download 
            send_file_path : none 


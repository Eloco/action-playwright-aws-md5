name: 'sec_playwright_list_news_nonkey'

on:
  workflow_dispatch:
    inputs:
        logLevel:
          description: 'Log level'     
          required: true
          default: 'warning'
        tags:
          description: 'Test action'  
  schedule:
    - cron:  '0 */2 * * *'

jobs:
  main:
    env:
      gist_id : 3fd32567b6c8f6c79808905de208e59a
      script_name: sec_playwright_list_news_nonkey
      FILE_BASE: message
      IF_PLAYWRIGHT: False
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codes
        uses: actions/checkout@v2
        with:
          repository: 'Eloco/Sec-action-playwright-aws-md5'
          token: '${{ secrets.SEC_TOKEN     }}'

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.9

      - name: set cn-lang
        run: |
            sudo apt-get install fonts-wqy-zenhei
        continue-on-error: true

      - name: Install dependencies
        run: |
            python -m pip install --upgrade pip
            pip install pipreqs
            pipreqs .
            pip install -r requirements.txt
            python -m playwright install

      - name: run python downloader
        run: |
            export command="python script/playwright_list_news_nonkey.py 2>/dev/null"
            $command || $command  #retry command twice 

      - name: gist-read
        uses: sergeysova/gist-read-action@v1
        id: example-gist
        with:
          gist_id: ${{env.gist_id}}
          file_name: ${{env.script_name}}
        env:
          GITHUB_TOKEN: ${{ secrets.SEC_TOKEN }}

      - name: md5_count
        run: |
            wget https://raw.githubusercontent.com/Eloco/action-playwright-aws-md5/main/script/gist_md5.py
            echo "${{ steps.example-gist.outputs.content }}" > md5.txt
            files_num=`python gist_md5.py --file_md5="./md5.txt" --file_dir=${{ env.FILE_BASE }}`
            echo $files_num
            echo '::set-output name=FILE_NUM::'$files_num
            head md5.txt
        id: gist-md5

      - uses: popsiclestick/gist-sync-action@v1.2.0
        if  :  steps.gist-md5.outputs.FILE_NUM != '0'
        with:
          auth: ${{ secrets.SEC_TOKEN }}
          gist_url: https://gist.github.com/Eloco/${{env.gist_id}}
          gist_title: ${{env.script_name}}
          gist_description: ${{env.script_name}}
          github_file: md5.txt

      - name: send skype
        uses: Eloco/docker-action-send-skype@v2
        if  : steps.gist-md5.outputs.FILE_NUM != '0'
        with:
            skype_username : ${{ secrets.SKYPE_MINE_USERNAME }}
            skype_password : ${{ secrets.SKYPE_MINE_PASSWORD }}
            skype_ids      : 19:685d8e27d15d473eb1066f8dac09dcda@thread.skype
            send_msg_path  : ${{ env.FILE_BASE }}
            send_file_path : none


name: 'misc_md5'

on:
  workflow_dispatch:
    inputs:
        logLevel:
          description: 'Log level'     
          required: true
          default: 'warning'
        tags:
          description: 'action'  
  schedule:
    - cron:  '*/10 * * * *'

jobs:
  main:
    runs-on: ubuntu-latest
    env:
      FILE_BASE: message
      FILE_PATH: message/message.txt
      IF_AWS       : True
      IF_PLAYWRIGHT: False
    strategy:
      matrix:
       include:
         - script: https://raw.githubusercontent.com/Eloco/Script-collect/main/misc/weather.sh
    steps:
      - name: Checkout codes
        uses: actions/checkout@v1

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.9

      - name: Install dependencies
        run: |
            python -m pip install --upgrade pip
            pip install pipreqs
            pipreqs .
            pip install -r requirements.txt

      - name: Install Playwright
        if: ${{ env.IF_PLAYWRIGHT == 'True'}}
        run: |
            python -m playwright install

      - name: run bash script
        run: |
            curl $MATRIX_SCRIPT -o misc_script
            chmod +x misc_script
            mkdir $FILE_BASE
            export command="bash misc_script"
            $command || $command  #retry command twice 
            sed -i '1i [GITHUB ACTION] <misc-aws-md5> weather.sh' $FILE_PATH
            cat $FILE_PATH
        env:
            MATRIX_SCRIPT: ${{matrix.script}}

      - name: aws setup
        if: ${{ env.IF_AWS == 'True'}}
        run: |
            python -m pip install awscli
            mkdir ~/.aws
            echo "[default]" >> ~/.aws/credentials
            echo "[default]" >> ~/.aws/config
            echo "aws_access_key_id    = ${{ secrets.AWS_ACCESS_KEY_ID     }}" >> ~/.aws/credentials
            echo "aws_secret_access_key= ${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> ~/.aws/credentials
            echo "region               = ap-east-1"                            >> ~/.aws/config

      - name: aws md5 check
        if: ${{ env.IF_AWS == 'True'}}
        run: |
            export action_bucket=s3://`echo ${GITHUB_REPOSITORY_OWNER}action | tr "[A-Z]" "[a-z]"`
            export command="python aws/md5_aws.py --files_path=$FILE_BASE 2>/dev/null"
            files_num=`$command || $command || echo 0` #retry command twice 
            echo $files_num
            echo '::set-output name=FILE_NUM::'$files_num
        id: aws-md5

      - name: send skype
        uses: Eloco/docker-action-send-skype@v2
        if  : env.IF_AWS == 'False' || steps.aws-md5.conclusion == 'skipped' || steps.aws-md5.outputs.FILE_NUM != '0'  
        with:
            skype_username : ${{ secrets.SKYPE_USERNAME }}
            skype_password : ${{ secrets.SKYPE_PASSWORD }}
            skype_ids      : 19:d32d3d93d57740308986b42ec36e5525@thread.skype
            send_msg_path  : ${{ env.FILE_BASE }}
            send_file_path : none
